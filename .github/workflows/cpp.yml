name: C++ Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
      - name: Build perf benchmark (clean out-of-source)
        working-directory: android-auditor/perf
        run: |
          # ensure clean build directory to avoid stale CMakeCache references
          rm -rf build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Build setout examples
        working-directory: setout
        run: make
      - name: Run setout tests
        working-directory: setout
        run: |
          chmod +x tests/run.sh || true
          ./tests/run.sh || true
