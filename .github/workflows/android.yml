name: "Android Build"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-ndk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip cmake build-essential wget openjdk-11-jdk-headless
      - name: Download Android commandline tools and install SDK/NDK
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
        run: |
          set -eux
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          # download command line tools and install into 'latest' for sdkmanager compatibility
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmd.zip
          unzip -q cmd.zip -d tmp
          rm cmd.zip
          # move inner cmdline-tools directory to expected 'latest' folder
          mv tmp/cmdline-tools latest
          rm -rf tmp
          SDKMANAGER=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager
          chmod +x "$SDKMANAGER" || true
          export PATH=$(dirname "$SDKMANAGER"):$PATH
          yes | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          "$SDKMANAGER" --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-21" "ndk;21.4.7075529"
      - name: Build with NDK (in-tree CMake)
        env:
          ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
          ANDROID_NDK_ROOT: ${{ github.workspace }}/.android-sdk/ndk/21.4.7075529
        run: |
          set -eux
          mkdir -p android-auditor/cpp_auditor/android_cpp/build
          cd android-auditor/cpp_auditor/android_cpp/build
          cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 -DANDROID_NDK=$ANDROID_NDK_ROOT -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake ..
          cmake --build . --config Release
